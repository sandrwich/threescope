<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Visor/eye shape -->
  <path d="M 48 256 Q 256 56 464 256" fill="none" stroke="#fff" stroke-width="36" stroke-linecap="round"/>
  <path d="M 464 256 Q 256 456 48 256" fill="none" stroke="#fff" stroke-width="36" stroke-linecap="round"/>

  <!-- Satellite — minimal geometric, tilted 30° -->
  <g transform="translate(256,256) rotate(-30)">
    <!-- Solar panels -->
    <rect x="-72" y="-12" width="44" height="24" rx="4" fill="#fff"/>
    <rect x="28"  y="-12" width="44" height="24" rx="4" fill="#fff"/>
    <!-- Body (slightly larger, connects panels) -->
    <rect x="-18" y="-18" width="36" height="36" rx="8" fill="#fff"/>
  </g>
</svg>
